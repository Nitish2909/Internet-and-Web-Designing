<!doctype html>
<html lang="en">
  <head>
    <title>List in HTML</title>
  </head>
  <body>
    <!--Ordered list-->
    <h3>Fruites</h3>
    <ol>
      <li>Apple</li>
      <li>Mango</li>
      <li>PineApple</li>
    </ol>

    <!--Unordered list-->
    <h3>Morning Routine</h3>
    <ul>
      <li>Wake up</li>
      <li>Brush teeth</li>
      <li>Go to college</li>
    </ul>
  </body>
</html>
